name: Build Dev client

on:
    workflow_dispatch:
        inputs:
            expo_sdk_version:
                description: "Expo SDK version (example: 53)"
                required: false
                type: string

            extra_dependencies:
                description: >
                    JSON array of dependencies. Examples:
                    ["expo-camera","react-native-mmkv"] OR
                    [{"name":"expo-camera"},{"name":"react-native-mmkv","version":"3.0.1"}]
                required: false
                type: string

jobs:
    build-ios:
        runs-on: macos-latest

        steps:
            - name: 📥 Checkout repo
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: 🛠️ Setup Latest Xcode Dynamically
              uses: maxim-lobanov/setup-xcode@v1
              with:
                  xcode-version: "latest-stable"

            - name: 📦 Install Dependencies
              run: bun install --frozen-lockfile

            # Optional Expo SDK switch
            - name: 🔄 Switch Expo SDK Version
              if: ${{ inputs.expo_sdk_version != '' }}
              shell: bash
              run: |
                  set -e

                  SDK_VERSION="${{ inputs.expo_sdk_version }}"

                  echo "➡️ Installing Expo SDK $SDK_VERSION"

                  bunx expo install expo@$SDK_VERSION

                  # Upgrade SDK-compatible packages
                  bunx expo install --fix

            # Optional dependency installation
            - name: ➕ Install Extra Dependencies
              if: ${{ inputs.extra_dependencies != '' }}
              shell: bash
              run: |
                  set -e

                  echo '${{ inputs.extra_dependencies }}' > deps.json

                  node <<'EOF'
                  const fs = require('fs');

                  const deps = JSON.parse(fs.readFileSync('deps.json', 'utf8'));

                  if (!Array.isArray(deps)) {
                    throw new Error('extra_dependencies must be an array');
                  }

                  const packages = deps.map(dep => {
                    if (typeof dep === 'string') {
                      return dep;
                    }

                    if (typeof dep === 'object' && dep.name) {
                      return dep.version
                        ? `${dep.name}@${dep.version}`
                        : dep.name;
                    }

                    throw new Error(`Invalid dependency entry: ${JSON.stringify(dep)}`);
                  });

                  console.log(packages.join(' '));

                  fs.writeFileSync('deps.txt', packages.join(' '));
                  EOF

                  DEPS=$(cat deps.txt)

                  if [ -n "$DEPS" ]; then
                    echo "➡️ Installing: $DEPS"
                    bunx expo install $DEPS
                  fi

            - name: ⚙️ Expo prebuild
              run: bunx expo prebuild --platform ios --clean

            - name: 📦 Install CocoaPods
              shell: bash
              run: |
                  set -e
                  cd ios
                  rm -rf Pods Podfile.lock
                  pod repo update
                  pod install

            - name: 🏗 Build unsigned iOS dev client
              shell: bash
              run: |
                  set -o pipefail
                  cd ios

                  xcodebuild \
                    -workspace exposink.xcworkspace \
                    -scheme exposink \
                    -configuration Debug \
                    -destination 'generic/platform=iOS' \
                    -sdk iphoneos \
                    -derivedDataPath build \
                    CODE_SIGN_STYLE=Manual \
                    CODE_SIGNING_REQUIRED=NO \
                    CODE_SIGN_IDENTITY="" \
                    build | tee build.log

            - name: 📦 Create unsigned IPA
              shell: bash
              run: |
                  set -e
                  cd ios

                  APP="build/Build/Products/Debug-iphoneos/exposink.app"

                  if [ ! -d "$APP" ]; then
                    echo "❌ App bundle not found at $APP"
                    exit 1
                  fi

                  rm -rf Payload exposink-dev-client.ipa
                  mkdir Payload
                  cp -R "$APP" Payload/

                  zip -qry exposink-dev-client.ipa Payload
                  mv exposink-dev-client.ipa ..

            - name: 📤 Upload IPA
              uses: actions/upload-artifact@v4
              with:
                  name: exposink-dev-client-ipa
                  path: exposink-dev-client.ipa
                  retention-days: 2
