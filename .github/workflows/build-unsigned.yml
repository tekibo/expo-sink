name: Build Dev client

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # - name: 🟢 Setup Node
      #   uses: actions/setup-node@v4
      #   with:
      #       node-version: 22

      - name: 🛠️ Setup Latest Xcode Dynamically
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "latest-stable"

      - name: 📦 Install Dependencies
        run: bun install --frozen-lockfile

      - name: ⚙️ Expo prebuild
        run: bunx expo prebuild --platform ios --clean

      - name: 📦 Install CocoaPods
        shell: bash
        run: |
          set -e
          cd ios
          rm -rf Pods Podfile.lock
          pod repo update
          pod install

      - name: 🏗 Build unsigned iOS dev client
        shell: bash
        run: |
          set -o pipefail
          cd ios

          xcodebuild \
            -workspace exposink.xcworkspace \
            -scheme exposink \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build | tee build.log

      - name: 📦 Create unsigned IPA
        shell: bash
        run: |
          set -e
          cd ios

          APP="build/Build/Products/Debug-iphoneos/exposink.app"

          if [ ! -d "$APP" ]; then
            echo "App bundle not found"
            exit 1
          fi

          rm -rf Payload exposink-dev-client.ipa
          mkdir Payload
          cp -R "$APP" Payload/

          zip -qry exposink-dev-client.ipa Payload
          mv exposink-dev-client.ipa ..

      - name: 📤 Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: exposink-dev-client-ipa
          path: exposink-dev-client.ipa
          retention-days: 2
