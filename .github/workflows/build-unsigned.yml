name: Build Dev client

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: 🛠️ Setup Latest Xcode Dynamically
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "latest-stable"

      - name: 📦 Install Dependencies
        run: bun install --frozen-lockfile

      - name: ⚙️ Expo prebuild
        run: bunx expo prebuild --platform ios --clean

      - name: 📦 Install CocoaPods
        shell: bash
        run: |
          set -e
          cd ios
          rm -rf Pods Podfile.lock
          pod repo update
          pod install

      # 🏗 Build unsigned iOS dev client (Fixed Workspace/Scheme paths)
      - name: 🏗 Build unsigned iOS dev client
        shell: bash
        run: |
          set -o pipefail
          cd ios

          # Manually set names to avoid shell globbing errors
          # Expo prebuild always creates [slug].xcworkspace
          WORKSPACE="exposink.xcworkspace"
          SCHEME="exposink"

          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CLANG_CXX_LANGUAGE_STANDARD="c++20" \
            CLANG_CXX_LIBRARY="libc++" \
            OTHER_CPLUSPLUSFLAGS="-DFORCE_CXX20" \
            build | tee build.log

      # 📦 Create unsigned IPA (Updated Path)
      - name: 📦 Create unsigned IPA
        shell: bash
        run: |
          set -e
          cd ios

          # The path is now relative to the 'ios' folder because of the 'cd' above
          APP="build/Build/Products/Debug-iphoneos/exposink.app"

          if [ ! -d "$APP" ]; then
            echo "❌ App bundle not found at $APP"
            exit 1
          fi

          rm -rf Payload exposink-dev-client.ipa
          mkdir Payload
          cp -R "$APP" Payload/

          zip -qry exposink-dev-client.ipa Payload
          mv exposink-dev-client.ipa ..

      - name: 📤 Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: exposink-dev-client-ipa
          path: exposink-dev-client.ipa
          retention-days: 2
