workflows:
  build-dev-client:
    name: Build Dev Client
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      node: latest
      xcode: latest
      vars:
        BUNDLE_ID: "com.tekibo.exposink"
        PATH: $PATH:$HOME/.bun/bin
    scripts:
      - name: 📥 Setup Bun
        script: |
          curl -fsSL https://bun.sh/install | bash
          echo "export PATH=\"\$HOME/.bun/bin:\$PATH\"" >> $CM_ENV

      - name: 📦 Install Dependencies
        script: |
          bun install --frozen-lockfile

      - name: ⚙️ Expo prebuild
        script: |
          bunx expo prebuild --platform ios --clean

      - name: 📦 Install CocoaPods
        script: |
          cd ios
          rm -rf Pods Podfile.lock
          pod repo update
          pod install

      - name: 🏗 Build unsigned iOS dev client
        script: |
          cd ios
          xcodebuild \
            -workspace exposink.xcworkspace \
            -scheme exposink \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build | tee build.log

      - name: 📦 Create unsigned IPA
        script: |
          cd ios
          APP="build/Build/Products/Debug-iphoneos/exposink.app"

          if [ ! -d "$APP" ]; then
            echo "❌ Error: .app bundle not found at $APP. Check build.log for details."
            exit 1
          fi

          rm -rf Payload exposink-dev-client.ipa
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -qry exposink-dev-client.ipa Payload
          mv exposink-dev-client.ipa $CM_EXPORT_DIR

    artifacts:
      - $CM_EXPORT_DIR/*.ipa
    publishing:
      email:
        recipients:
          - abhijit@tekibo.in
