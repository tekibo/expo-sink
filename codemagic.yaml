workflows:
  build-dev-client:
    name: Build Dev Client
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      node: latest
      xcode: latest
      vars:
        BUNDLE_ID: "com.tekibo.exposink"
        PATH: $PATH:$HOME/.bun/bin
    scripts:
      - name: 📥 Setup Bun
        script: |
          curl -fsSL https://bun.sh/install | bash
          echo "export PATH=\"\$HOME/.bun/bin:\$PATH\"" >> $CM_ENV

      - name: 📦 Install Dependencies
        script: |
          bun install --frozen-lockfile

      - name: ⚙️ Expo prebuild
        script: |
          bunx expo prebuild --platform ios --clean

      - name: 📦 Install CocoaPods
        script: |
          cd ios
          rm -rf Pods Podfile.lock
          pod repo update
          pod install

      - name: 🏗 Build unsigned iOS dev client
        script: |
          set -e
          set -o pipefail
          cd ios
          
          # AD_HOC_CODE_SIGNING_ALLOWED=YES is critical for unsigned device builds on Codemagic.
          # CLANG_CXX flags ensure C++20 compatibility for llama.rn and Worklets.
          xcodebuild \
            -workspace exposink.xcworkspace \
            -scheme exposink \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            CLANG_CXX_LANGUAGE_STANDARD="c++20" \
            CLANG_CXX_LIBRARY="libc++" \
            OTHER_CPLUSPLUSFLAGS="-DFORCE_CXX20" \
            build | tee build.log

      - name: 📦 Create unsigned IPA
        script: |
          set -e
          cd ios
          
          # Dynamically find the app bundle to be safe
          APP=$(find build/Build/Products -name "*.app" | head -n 1)
          
          if [ -z "$APP" ]; then
            echo "❌ Error: .app bundle not found in build directory. Check build.log."
            exit 1
          fi
          
          echo "Found app bundle at: $APP"
          
          # Verify Info.plist exists
          if [ ! -f "$APP/Info.plist" ]; then
            echo "❌ Error: Info.plist missing from $APP. Build may have failed silently."
            exit 1
          fi

          rm -rf Payload exposink-dev-client.ipa
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -qry exposink-dev-client.ipa Payload
          mv exposink-dev-client.ipa $CM_EXPORT_DIR

    artifacts:
      - $CM_EXPORT_DIR/*.ipa
    publishing:
      email:
        recipients:
          - abhijit@tekibo.in
